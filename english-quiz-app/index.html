<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Vocabulary Quiz - 3000 từ thông dụng</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Start Screen -->
    <div id="start-screen" class="screen active">
        <div class="start-container">
            <div class="logo-icon">📚</div>
            <h1>English Vocabulary</h1>
            <p class="subtitle">Học 3000 từ tiếng Anh thông dụng nhất</p>
            <div class="start-stats" id="start-stats" style="display:none;">
                <div class="stat-item">
                    <span class="stat-number" id="stat-learned">0</span>
                    <span class="stat-label">Đã học</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="stat-remaining">3000</span>
                    <span class="stat-label">Còn lại</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="stat-accuracy">0%</span>
                    <span class="stat-label">Chính xác</span>
                </div>
            </div>
            <div class="start-options">
                <label class="toggle-option">
                    <input type="checkbox" id="shuffle-toggle" checked>
                    <span class="toggle-slider"></span>
                    <span class="toggle-text">Xáo trộn từ vựng</span>
                </label>
                <label class="toggle-option">
                    <input type="checkbox" id="darkmode-toggle">
                    <span class="toggle-slider"></span>
                    <span class="toggle-text">Chế độ tối</span>
                </label>
            </div>
            <button id="start-btn" class="btn-primary btn-large">Bắt đầu học</button>
            <button id="reset-btn" class="btn-secondary" style="display:none;">Đặt lại tiến trình</button>
        </div>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="screen">
        <div class="quiz-container">
            <!-- Top Bar -->
            <div class="top-bar">
                <button id="back-btn" class="icon-btn" title="Về trang chính">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                </button>
                <div class="progress-info">
                    <span id="word-counter">1 / 3000</span>
                </div>
                <div class="score-badge">
                    <span class="correct-count" id="correct-count">0</span>
                    <span class="score-sep">·</span>
                    <span class="wrong-count" id="wrong-count">0</span>
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <!-- Word Display -->
            <div class="word-card" id="word-card">
                <div class="word-label">Từ tiếng Anh</div>
                <div class="word-text" id="word-text">Loading...</div>
                <div class="word-phonetic" id="word-phonetic"></div>
                <div class="word-vowels" id="word-vowels"></div>
                <button class="speak-btn" id="speak-btn" title="Phát âm">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                </button>
            </div>

            <!-- Feedback -->
            <div class="feedback" id="feedback"></div>

            <!-- Options -->
            <div class="options-grid" id="options-grid">
                <button class="option-btn" data-index="0"></button>
                <button class="option-btn" data-index="1"></button>
                <button class="option-btn" data-index="2"></button>
                <button class="option-btn" data-index="3"></button>
            </div>

            <!-- Next Button -->
            <button id="next-btn" class="btn-primary" disabled>
                Tiếp theo
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
